<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader Otimizado Multi-Formatos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        .cropper-view-box, .cropper-face { border-radius: 8px; }
        .cropper-modal { background-color: rgba(0, 0, 0, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white min-h-screen m-0 p-0 overflow-hidden flex flex-col items-center justify-center">

    <div id="initial-view" class="p-6 text-center w-full max-w-sm flex flex-col items-center justify-center h-full">
        <div class="w-16 h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mb-4">
            <i data-lucide="scissors" class="w-8 h-8"></i>
        </div>
        
        <h1 class="text-xl font-black text-gray-800 mb-2">Editor Rápido</h1>
        <p class="text-xs text-gray-500 mb-6">Tire um print ou copie uma imagem e pressione <kbd class="bg-gray-100 border border-gray-300 px-1 py-0.5 rounded text-gray-800 font-bold mx-1">Ctrl+V</kbd> aqui.</p>

        <input type="file" id="file-input-traditional" class="hidden" accept="image/*" onchange="handleTraditionalUpload(event)">
        
        <div id="status-area" onclick="document.getElementById('file-input-traditional').click()" class="w-full h-32 flex flex-col items-center justify-center border-2 border-dashed border-teal-200 rounded-2xl bg-teal-50 cursor-pointer hover:bg-teal-100 transition-colors">
            <i data-lucide="upload" class="w-6 h-6 text-teal-500 mb-2"></i>
            <span id="status-text" class="text-teal-700 font-bold text-sm">Ou clique aqui para enviar</span>
            <p class="text-[10px] text-teal-600/70 mt-1 uppercase tracking-widest font-black">Upload ImgBB</p>
        </div>
    </div>

    <div id="crop-view" class="hidden w-full h-full bg-gray-50 flex flex-col">
        <div class="p-3 bg-white border-b border-gray-200 shrink-0 text-center">
            <h2 class="text-sm font-black text-gray-800">Enquadramento</h2>
        </div>

        <div class="flex justify-center gap-2 overflow-x-auto no-scrollbar p-2 bg-white border-b border-gray-100 shrink-0">
            <button onclick="setAspectRatio(4/5, this)" class="ratio-btn bg-teal-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm whitespace-nowrap">4:5 (Padrão)</button>
            <button onclick="setAspectRatio(1, this)" class="ratio-btn bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm whitespace-nowrap">1:1</button>
            <button onclick="setAspectRatio(16/9, this)" class="ratio-btn bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm whitespace-nowrap">16:9</button>
        </div>
        
        <div class="flex-1 bg-gray-200 w-full relative overflow-hidden">
            <img id="image-to-crop" class="max-w-full hidden">
        </div>

        <div class="p-3 bg-white border-t border-gray-200 shrink-0 flex gap-2">
            <button onclick="cancelCrop()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl text-xs transition-colors">Cancelar</button>
            <button id="btn-execute-crop" onclick="executeCropAndUpload()" class="flex-[2] bg-teal-600 hover:bg-teal-700 text-white font-black py-3 rounded-xl shadow-md text-xs flex items-center justify-center gap-1 transition-colors">
                <i data-lucide="check" class="w-4 h-4"></i> Recortar & Salvar
            </button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <i data-lucide="cloud-upload" class="w-10 h-10 text-teal-600 animate-bounce mb-3"></i>
        <h3 class="text-sm font-black text-gray-800">A processar imagem...</h3>
    </div>

    <script>
        lucide.createIcons();

        // CHAVE DA API IMGBB INSERIDA AQUI (Isolada de conflitos)
        const IMGBB_API_KEY = "eb75e9530b3092570067d4e63d367ad2";

        const initialView = document.getElementById('initial-view');
        const cropView = document.getElementById('crop-view');
        const imageToCrop = document.getElementById('image-to-crop');
        const statusArea = document.getElementById('status-area');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');

        let cropper = null;

        // Descobre em qual campo da loja mãe vamos injetar a imagem
        const urlParams = new URLSearchParams(window.location.search);
        const targetFieldId = urlParams.get('target');

        // Eventos Drag & Drop
        statusArea.ondragover = (e) => { e.preventDefault(); statusArea.classList.add('bg-teal-200'); };
        statusArea.ondragleave = (e) => { e.preventDefault(); statusArea.classList.remove('bg-teal-200'); };
        statusArea.ondrop = (e) => {
            e.preventDefault();
            statusArea.classList.remove('bg-teal-200');
            if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if(file.type.startsWith('image/')) loadImageForCropping(file);
            }
        };

        // Captura o Ctrl+V
        window.addEventListener('paste', (e) => {
            if (!initialView.classList.contains('hidden')) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let file = null;
                for (const item of items) {
                    if (item.type.indexOf('image') === 0) { file = item.getAsFile(); break; }
                }
                if (file) loadImageForCropping(file);
            }
        });

        function handleTraditionalUpload(e) {
            if(e.target.files && e.target.files.length > 0) loadImageForCropping(e.target.files[0]);
        }

        function loadImageForCropping(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imageToCrop.src = e.target.result;
                imageToCrop.classList.remove('hidden');
                initialView.classList.add('hidden');
                cropView.classList.remove('hidden');

                if (cropper) cropper.destroy();

                cropper = new Cropper(imageToCrop, {
                    aspectRatio: 4 / 5, 
                    viewMode: 1, 
                    dragMode: 'move',
                    autoCropArea: 0.9,
                    background: false,
                    guides: true,
                });
            };
            reader.readAsDataURL(file);
        }

        function setAspectRatio(ratio, btnElement) {
            if (cropper) cropper.setAspectRatio(ratio);
            document.querySelectorAll('.ratio-btn').forEach(btn => {
                btn.className = "ratio-btn bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm whitespace-nowrap";
            });
            btnElement.className = "ratio-btn bg-teal-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm whitespace-nowrap";
        }

        function cancelCrop() {
            if (cropper) cropper.destroy();
            imageToCrop.src = '';
            cropView.classList.add('hidden');
            initialView.classList.remove('hidden');
            
            const btns = document.querySelectorAll('.ratio-btn');
            if(btns.length > 0) setAspectRatio(4/5, btns[0]);
        }

        function executeCropAndUpload() {
            if (!cropper) return;
            loadingOverlay.classList.remove('hidden');
            document.getElementById('btn-execute-crop').disabled = true;

            const canvas = cropper.getCroppedCanvas({
                maxWidth: 1080,
                maxHeight: 1080,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            canvas.toBlob((blob) => { uploadToImgBB(blob); }, 'image/webp', 0.85);
        }

        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append('image', imageBlob);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const finalUrl = data.data.url;
                    
                    // Magia: Manda a URL para o documento pai e fecha o Iframe
                    if (window.parent && targetFieldId) {
                        const targetInput = window.parent.document.getElementById(targetFieldId);
                        if (targetInput) {
                            targetInput.value = finalUrl;
                            
                            // Aciona o updatePreview da loja para aparecer a foto de imediato
                            if(typeof window.parent.window.updateEditorPreview === 'function') {
                                window.parent.window.updateEditorPreview();
                            }
                        }
                    }
                    
                    // Manda a loja fechar o modal do uploader
                    if(typeof window.parent.window.closeUploader === 'function') {
                        window.parent.window.closeUploader();
                        window.parent.window.showToast("Imagem processada!");
                    }

                } else {
                    throw new Error("Falha na API ImgBB.");
                }
            } catch (error) {
                loadingOverlay.classList.add('hidden');
                cancelCrop();
                statusText.innerText = "Erro ao enviar. Tente de novo.";
                statusText.className = "text-red-500 font-bold text-sm";
                statusArea.classList.replace('bg-teal-50', 'bg-red-50');
                statusArea.classList.replace('border-teal-200', 'border-red-200');
                document.getElementById('btn-execute-crop').disabled = false;
            }
        }
    </script>
</body>
</html>
