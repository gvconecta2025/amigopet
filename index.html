<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Amigo Pet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --cor-fundo: #f8fafc;
            --cor-primaria: #0f766e; 
            --cor-secundaria: #f59e0b; 
            --cor-texto: #334155;
            --cor-zap: #25D366;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .fade-enter { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .pb-safe { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
        .hidden { display: none !important; }
        
        /* Modal Overlay */
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
    </style>

    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
    <meta name="theme-color" content="#0f766e">
    <link rel="apple-touch-icon" href="/image_322ea4.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.warn('Arquivo sw.js físico falhou, verifique o GitHub.', err);
                });
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('install-btn');
            if (btn) btn.classList.remove('hidden');
        });

        window.installApp = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-btn').classList.add('hidden');
                }
                deferredPrompt = null;
            } else {
                window.showSystemMessage(
                    "Instalar o Aplicativo", 
                    "No Android: Procure 'Instalar Aplicativo' no menu do navegador (3 pontinhos).\n\nNo iPhone (iOS): Toque no botão 'Partilhar' (quadrado com seta) e escolha 'Adicionar à Tela de Início'.\n\nIsso vai instalar o Amigo Pet como um aplicativo completo no seu telemóvel!", 
                    "info"
                );
            }
        };
    </script>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-gray-100">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <button onclick="window.showView('home'); window.handleAdminTrigger()" class="flex items-center gap-3 focus:outline-none select-none">
                <img src="./image_322ea4.png" alt="Logótipo Amigo Pet" class="w-14 h-14 object-contain transition-transform active:scale-95 shrink-0 drop-shadow-sm">
                <div class="text-left pointer-events-none">
                    <h1 id="header-store-name" class="text-xl font-black text-teal-800 leading-none">Amigo Pet</h1>
                    <p class="text-[9px] text-gray-500 font-medium leading-tight mt-0.5"><i data-lucide="map-pin" class="w-3 h-3 inline"></i> Atendemos toda a cidade</p>
                </div>
            </button>
            
            <div class="flex items-center gap-2">
                <button onclick="window.shareApp()" class="p-2 text-gray-500 hover:text-teal-700 bg-gray-50 rounded-full transition-colors border border-gray-100 shadow-sm" title="Compartilhar App">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                </button>
                <button id="install-btn" onclick="window.installApp()" class="px-3 py-1.5 bg-teal-50 text-teal-700 text-xs font-bold rounded-lg border border-teal-200 hover:bg-teal-100 transition-colors shadow-sm hidden">
                    Instalar App
                </button>
                <button onclick="window.openLocation()" class="p-2 text-gray-500 hover:text-teal-700 bg-gray-50 rounded-full transition-colors border border-gray-100 shadow-sm" title="Nossa Loja">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </button>
                <button onclick="window.showView('cart')" class="relative p-2 text-gray-500 hover:text-teal-700 bg-gray-50 rounded-full transition-colors border border-gray-100 shadow-sm" title="Carrinho">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-sm">0</span>
                </button>
            </div>
        </div>
        
        <div class="max-w-3xl mx-auto px-4 pb-3 mt-1">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                <input type="text" id="searchInput" onkeyup="window.handleSearch(event)" placeholder="Buscar por ração, banho, gatos..." class="w-full bg-gray-100 border-none text-gray-700 text-sm rounded-2xl pl-10 pr-4 py-2.5 focus:ring-2 focus:ring-teal-600 outline-none transition-all">
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto pb-safe">

        <div id="home-view" class="px-4 py-6 fade-enter">
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-gray-800">Vitrine</h2>
                    <p class="text-sm text-gray-500 font-medium">Destaques e novidades para o seu pet.</p>
                </div>
            </div>
            <div id="feed-container" class="flex flex-col gap-6">
                </div>
        </div>

        <div id="catalog-view" class="px-4 py-6 fade-enter hidden">
            <div class="mb-6">
                <h2 id="catalog-title" class="text-2xl font-black text-gray-800 flex items-center gap-2">
                    <i data-lucide="shopping-bag" class="w-6 h-6 text-teal-600"></i> Produtos
                </h2>
                <p id="catalog-subtitle" class="text-sm text-gray-500 font-medium">Encontre o que precisa.</p>
            </div>

            <div id="quick-tags" class="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                <button onclick="window.filterByTag('')" class="px-4 py-1.5 bg-teal-700 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-sm">Todos</button>
                <button onclick="window.filterByTag('cães')" class="px-4 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 text-xs font-bold rounded-full whitespace-nowrap transition-colors">Cães</button>
                <button onclick="window.filterByTag('gatos')" class="px-4 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 text-xs font-bold rounded-full whitespace-nowrap transition-colors">Gatos</button>
                <button onclick="window.filterByTag('acessórios')" class="px-4 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 text-xs font-bold rounded-full whitespace-nowrap transition-colors">Acessórios</button>
                <button onclick="window.filterByTag('higiene')" class="px-4 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 text-xs font-bold rounded-full whitespace-nowrap transition-colors">Higiene</button>
            </div>
            
            <div id="catalog-container" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </div>

        <div id="detail-view" class="px-4 py-6 fade-enter hidden">
            <button onclick="window.goBack()" class="flex items-center gap-2 text-teal-700 font-bold mb-4 hover:opacity-80 transition-opacity">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Voltar
            </button>
            <div id="detail-container" class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                </div>
        </div>

        <div id="cart-view" class="px-4 py-6 fade-enter hidden">
            <div class="mb-6 flex items-center gap-3">
                <button onclick="window.goBack()" class="text-teal-700 hover:opacity-80 transition-opacity">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <h2 class="text-2xl font-black text-gray-800">Seu Carrinho</h2>
            </div>
            
            <div id="cart-items-container" class="flex flex-col gap-4 mb-6">
                </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hidden" id="cart-summary">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 font-bold">Total do Pedido:</span>
                    <span id="cart-total" class="text-2xl font-black text-teal-700">R$ 0,00</span>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="window.checkoutWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#1ebd5a] text-white
